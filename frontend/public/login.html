<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Car Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-car" style="font-size: 64px; display: block; margin-bottom: 20px;"></i>
                <h2>Car Maintenance Visualizer</h2>
                <p>Войдите в свой аккаунт</p>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="password" name="password" required placeholder="••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-sign-in-alt"></i> Войти</button>
            </form>
            <div class="auth-footer">
                <p>Нет аккаунта? <a href="/register.html"><i class="fas fa-user-plus"></i> Зарегистрироваться</a></p>
                <p><a href="/"><i class="fas fa-arrow-left"></i> Вернуться на главную</a></p>
            </div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
