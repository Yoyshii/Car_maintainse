<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить автомобиль - Car Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .form-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-xl);
            padding: 32px;
            border: 1px solid var(--border-color);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            color: var(--text-primary);
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .color-preview {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            margin-top: 8px;
            border: 2px solid var(--border-color);
        }
        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .form-buttons button {
            flex: 1;
        }
        h2 {
            margin-bottom: 24px;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🚗</span>
                <span>Car Maintenance Visualizer</span>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/visualization.html" class="nav-link">3D Визуализация</a>
                <div id="authButtons" style="display: flex; gap: 12px;">
                    <a href="/login.html" class="btn btn-outline">Вход</a>
                    <a href="/register.html" class="btn btn-primary">Регистрация</a>
                </div>
                <div id="userMenu" style="display: none; align-items: center; gap: 16px;">
                    <span class="user-name" id="userName"></span>
                    <a href="/dashboard.html" class="nav-link">Кабинет</a>
                    <a href="/visualization.html" class="nav-link">3D Визуализация</a>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="form-container">
                <div class="form-card">
                    <h2>➕ Добавление нового автомобиля</h2>
                    <form id="addCarForm">
                        <div class="form-group">
                            <label>Марка *</label>
                            <input type="text" id="brand" required placeholder="Например: Toyota">
                        </div>
                        <div class="form-group">
                            <label>Модель *</label>
                            <input type="text" id="model" required placeholder="Например: Camry">
                        </div>
                        <div class="form-group">
                            <label>Год выпуска</label>
                            <input type="number" id="year" value="2024" min="1900" max="2025">
                        </div>
                        <div class="form-group">
                            <label>Госномер</label>
                            <input type="text" id="license_plate" placeholder="А123ВС">
                        </div>
                        <div class="form-group">
                            <label>Цвет</label>
                            <input type="color" id="color" value="#dc2626">
                            <div class="color-preview" id="colorPreview" style="background: #dc2626;"></div>
                        </div>
                        <div class="form-group">
                            <label>Начальный пробег (км)</label>
                            <input type="number" id="mileage" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Тип двигателя</label>
                            <select id="engine_type">
                                <option value="">Не указан</option>
                                <option value="Бензин">Бензин</option>
                                <option value="Дизель">Дизель</option>
                                <option value="Гибрид">Гибрид</option>
                                <option value="Электро">Электро</option>
                            </select>
                        </div>
                        <div class="form-buttons">
                            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                            <button type="button" onclick="window.location.href='/visualization.html'" class="btn btn-outline">← Назад</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Car Maintenance Visualizer. Все права защищены.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        document.getElementById('color').addEventListener('input', function(e) {
            document.getElementById('colorPreview').style.background = e.target.value;
        });
        
        function updateUI() {
            const isAuth = window.auth && window.auth.isAuthenticated();
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            const userNameSpan = document.getElementById('userName');
            
            if (isAuth) {
                if (authButtons) authButtons.style.display = 'none';
                if (userMenu) userMenu.style.display = 'flex';
                const user = window.auth.getUser();
                if (userNameSpan) userNameSpan.textContent = user?.username || user?.full_name || '';
            } else {
                if (authButtons) authButtons.style.display = 'flex';
                if (userMenu) userMenu.style.display = 'none';
                window.location.href = '/login.html';
            }
        }
        
        document.getElementById('addCarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = window.auth.getToken();
            if (!token) {
                alert('Необходимо войти в аккаунт');
                window.location.href = '/login.html';
                return;
            }
            
            const carData = {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                year: parseInt(document.getElementById('year').value),
                license_plate: document.getElementById('license_plate').value,
                color: document.getElementById('color').value,
                mileage: parseInt(document.getElementById('mileage').value),
                engine_type: document.getElementById('engine_type').value
            };
            
            try {
                const response = await fetch(`${API_URL}/cars`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(carData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Ошибка при сохранении');
                }
                
                const newCar = await response.json();
                alert(`✅ Автомобиль ${carData.brand} ${carData.model} успешно добавлен!`);
                window.location.href = '/visualization.html';
                
            } catch (error) {
                console.error(error);
                alert('❌ Ошибка при добавлении автомобиля: ' + error.message);
            }
        });
        
        document.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
