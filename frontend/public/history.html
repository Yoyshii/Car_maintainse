<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service History - Car Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🚗</span>
                <span>Car Maintenance Visualizer</span>
            </div>
            <div class="nav-menu">
                <a href="/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/visualization.html" class="nav-link">3D Visualization</a>
                <a href="/history.html" class="nav-link active">Service History</a>
                <a href="/reports.html" class="nav-link">Reports</a>
                <div class="user-menu">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <h2>Service History</h2>
            <table class="history-table">
                <thead>
                    <tr><th>Date</th><th>Service</th><th>Part</th><th>Mileage</th><th>Cost</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Car Maintenance Visualizer. All rights reserved.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/common.js"></script>
</body>
</html>
