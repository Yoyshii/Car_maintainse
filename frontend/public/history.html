<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История ТО - Car Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Дополнительные стили для таблицы */
        .history-table {
            width: 100%;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            overflow: hidden;
            border-collapse: collapse;
            box-shadow: var(--shadow-md);
        }
        
        .history-table th, 
        .history-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }
        
        .history-table th {
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent-primary-light);
            font-weight: 600;
            border-bottom: 2px solid var(--accent-primary);
        }
        
        .history-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .history-table td:last-child {
            color: var(--success);
            font-weight: 600;
        }
        
        .empty-history {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-history i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 12px; color: inherit;">
                    <i class="fas fa-car"></i>
                    <span>Car Maintenance Visualizer</span>
                </a>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="/visualization.html" class="nav-link"><i class="fas fa-cube"></i> 3D Визуализация</a>
                <a href="/history.html" class="nav-link active"><i class="fas fa-history"></i> История ТО</a>
                <a href="/reports.html" class="nav-link"><i class="fas fa-chart-bar"></i> Отчеты</a>
                
                <div id="authButtons" style="display: flex; gap: 12px;">
                    <a href="/login.html" class="btn btn-outline"><i class="fas fa-sign-in-alt"></i> Вход</a>
                    <a href="/register.html" class="btn btn-primary"><i class="fas fa-user-plus"></i> Регистрация</a>
                </div>
                
                <div id="userMenu" style="display: none; align-items: center; gap: 16px;">
                    <span class="user-name" id="userName"></span>
                    <a href="/dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Кабинет</a>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <h2><i class="fas fa-history"></i> История технического обслуживания</h2>
            <div id="historyContainer" style="margin-top: 24px;">
                <div class="card" style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-pulse"></i> Загрузка истории...
                </div>
            </div>
        </main>

        <footer class="footer">
            <p><i class="far fa-copyright"></i> 2024 Car Maintenance Visualizer. Все права защищены.</p>
        </footer>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function loadHistory() {
            console.log('🔄 Загрузка истории...');
            
            const token = localStorage.getItem('car_token');
            console.log('Токен:', token ? 'есть' : 'нет');
            
            if (!token) {
                document.getElementById('historyContainer').innerHTML = `
                    <div class="card empty-history">
                        <i class="fas fa-lock"></i>
                        <p>Войдите в аккаунт для просмотра истории</p>
                        <a href="/login.html" class="btn btn-primary" style="margin-top: 16px; display: inline-block;">Войти</a>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const records = await response.json();
                    console.log('✅ Загружено записей:', records.length);
                    displayHistory(records);
                } else {
                    throw new Error('Ошибка загрузки');
                }
            } catch (error) {
                console.error(error);
                document.getElementById('historyContainer').innerHTML = `
                    <div class="card empty-history">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Ошибка загрузки истории</p>
                    </div>
                `;
            }
        }
        
        function displayHistory(records) {
            const container = document.getElementById('historyContainer');
            
            if (records.length === 0) {
                container.innerHTML = `
                    <div class="card empty-history">
                        <i class="fas fa-inbox"></i>
                        <p>История обслуживания пуста</p>
                        <p style="font-size: 14px; margin-top: 8px;">Добавьте первую запись через 3D визуализацию</p>
                        <a href="/visualization.html" class="btn btn-primary" style="margin-top: 16px; display: inline-block;">Перейти к визуализации</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <table class="history-table">
                    <thead>
                        <tr>
                            <th><i class="fas fa-calendar-alt"></i> Дата</th>
                            <th><i class="fas fa-car"></i> Автомобиль</th>
                            <th><i class="fas fa-tools"></i> Услуга</th>
                            <th><i class="fas fa-microchip"></i> Деталь</th>
                            <th><i class="fas fa-road"></i> Пробег</th>
                            <th><i class="fas fa-ruble-sign"></i> Стоимость</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${records.map(record => `
                            <tr>
                                <td>${record.date || '-'}</td>
                                <td><strong>${record.car_brand || ''} ${record.car_model || ''}</strong></td>
                                <td>${record.service_name || record.service_type || '-'}</td>
                                <td>${record.part_key || '-'}</td>
                                <td>${record.mileage ? record.mileage.toLocaleString() + ' км' : '-'}</td>
                                <td>${record.cost ? record.cost.toLocaleString() + ' ₽' : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function updateUI() {
            const isAuth = !!localStorage.getItem('car_token');
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            const userNameSpan = document.getElementById('userName');
            
            if (isAuth) {
                if (authButtons) authButtons.style.display = 'none';
                if (userMenu) userMenu.style.display = 'flex';
                try {
                    const user = JSON.parse(localStorage.getItem('car_user') || '{}');
                    if (userNameSpan) userNameSpan.textContent = user?.username || user?.full_name || '';
                } catch(e) {}
                loadHistory();
            } else {
                if (authButtons) authButtons.style.display = 'flex';
                if (userMenu) userMenu.style.display = 'none';
                document.getElementById('historyContainer').innerHTML = `
                    <div class="card empty-history">
                        <i class="fas fa-lock"></i>
                        <p>Войдите в аккаунт для просмотра истории</p>
                        <a href="/login.html" class="btn btn-primary" style="margin-top: 16px; display: inline-block;">Войти</a>
                    </div>
                `;
            }
        }
        
        document.addEventListener('DOMContentLoaded', updateUI);
        window.addEventListener('storage', updateUI);
    </script>
</body>
</html>
