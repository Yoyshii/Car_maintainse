<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История ТО - Car Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🚗</span>
                <span>Car Maintenance Visualizer</span>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/visualization.html" class="nav-link">3D Визуализация</a>
                <a href="/history.html" class="nav-link active">История ТО</a>
                <a href="/reports.html" class="nav-link">Отчеты</a>
                <div id="authButtons" style="display: flex; gap: 12px;">
                    <a href="/login.html" class="btn btn-outline">Вход</a>
                    <a href="/register.html" class="btn btn-primary">Регистрация</a>
                </div>
                <div id="userMenu" style="display: none; align-items: center; gap: 16px;">
                    <span class="user-name" id="userName"></span>
                    <a href="/dashboard.html" class="nav-link">Кабинет</a>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <h2>📋 История технического обслуживания</h2>
            <div id="historyContainer" style="margin-top: 20px;">
                <div class="loading">Загрузка истории...</div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Car Maintenance Visualizer. Все права защищены.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function loadHistory() {
            const token = window.auth.getToken();
            if (!token) {
                document.getElementById('historyContainer').innerHTML = '<div class="placeholder">🔒 Войдите в аккаунт для просмотра истории</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const records = await response.json();
                    displayHistory(records);
                } else {
                    throw new Error('Ошибка загрузки');
                }
            } catch (error) {
                console.error(error);
                document.getElementById('historyContainer').innerHTML = '<div class="placeholder">❌ Ошибка загрузки истории</div>';
            }
        }
        
        function displayHistory(records) {
            const container = document.getElementById('historyContainer');
            
            if (records.length === 0) {
                container.innerHTML = '<div class="placeholder">📭 История обслуживания пуста. Добавьте первую запись через 3D визуализацию!</div>';
                return;
            }
            
            container.innerHTML = `
                <table class="history-table">
                    <thead>
                        <tr><th>Дата</th><th>Автомобиль</th><th>Услуга</th><th>Деталь</th><th>Пробег</th><th>Стоимость</th></tr>
                    </thead>
                    <tbody>
                        ${records.map(record => `
                            <tr>
                                <td>${record.date}</td>
                                <td>${record.car_brand || ''} ${record.car_model || ''}</td>
                                <td>${record.service_name || record.service_type}</td>
                                <td>${record.part_key || '-'}</td>
                                <td>${record.mileage.toLocaleString()} км</td>
                                <td style="color: #22c55e;">${record.cost ? record.cost.toLocaleString() + ' ₽' : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function updateUI() {
            const isAuth = window.auth && window.auth.isAuthenticated();
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            const userNameSpan = document.getElementById('userName');
            
            if (isAuth) {
                if (authButtons) authButtons.style.display = 'none';
                if (userMenu) userMenu.style.display = 'flex';
                const user = window.auth.getUser();
                if (userNameSpan) userNameSpan.textContent = user?.username || user?.full_name || '';
                loadHistory();
            } else {
                if (authButtons) authButtons.style.display = 'flex';
                if (userMenu) userMenu.style.display = 'none';
                document.getElementById('historyContainer').innerHTML = '<div class="placeholder">🔒 Войдите в аккаунт для просмотра истории</div>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', updateUI);
        window.addEventListener('storage', updateUI);
    </script>
</body>
</html>
