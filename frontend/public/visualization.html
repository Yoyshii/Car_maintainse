<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Визуализация - Car Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🚗</span>
                <span>Car Maintenance Visualizer</span>
            </div>
            <div class="nav-menu">
                <a href="/dashboard.html" class="nav-link">Главная</a>
                <a href="/visualization.html" class="nav-link active">3D Визуализация</a>
                <a href="/history.html" class="nav-link">История ТО</a>
                <a href="/reports.html" class="nav-link">Отчеты</a>
                <div class="user-menu">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
        </nav>

        <main class="main-content viz-container">
            <div class="car-canvas-area">
                <canvas id="carCanvas" width="700" height="450"></canvas>
                <div class="hint">🖱️ Нажмите на любую цветную деталь</div>
            </div>
            <div class="info-panel" id="infoPanel">
                <div class="panel-header">
                    <div class="led"></div>
                    <span>СИСТЕМА ДИАГНОСТИКИ</span>
                </div>
                <div class="placeholder">
                    <div>🚗</div>
                    <div>ВЫБЕРИТЕ ДЕТАЛЬ</div>
                    <div>Нажмите на любую часть автомобиля</div>
                </div>
                <input type="number" id="mileageInput" placeholder="Обновить пробег (км)">
                <button id="updateMileageBtn">ОБНОВИТЬ ПРОБЕГ</button>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Car Maintenance Visualizer. Все права защищены.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/visualization.js"></script>
</body>
</html>
