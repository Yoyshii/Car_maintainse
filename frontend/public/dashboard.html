<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Car Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🚗</span>
                <span>Car Maintenance Visualizer</span>
            </div>
            <div class="nav-menu">
                <a href="/dashboard.html" class="nav-link active">Dashboard</a>
                <a href="/visualization.html" class="nav-link">3D Visualization</a>
                <a href="/history.html" class="nav-link">Service History</a>
                <a href="/reports.html" class="nav-link">Reports</a>
                <div class="user-menu">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="dashboard-header">
                <h1>Dashboard</h1>
                <p>Welcome, <span id="welcomeName"></span>!</p>
            </div>

            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon">🚗</div>
                    <div class="stat-info">
                        <div class="stat-value" id="carsCount">1</div>
                        <div class="stat-label">Vehicles</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalMileage">15,247</div>
                        <div class="stat-label">Total KM</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalCost">$6,200</div>
                        <div class="stat-label">Total Cost</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏰</div>
                    <div class="stat-info">
                        <div class="stat-value" id="upcomingServices">3</div>
                        <div class="stat-label">Upcoming Services</div>
                    </div>
                </div>
            </div>

            <div class="recent-card">
                <h3>Recent Maintenance</h3>
                <div id="recentList"></div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Car Maintenance Visualizer. All rights reserved.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
