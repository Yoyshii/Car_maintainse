<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчеты - Car Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🚗</span>
                <span>Car Maintenance Visualizer</span>
            </div>
            <div class="nav-menu">
                <a href="/dashboard.html" class="nav-link">Главная</a>
                <a href="/visualization.html" class="nav-link">3D Визуализация</a>
                <a href="/history.html" class="nav-link">История ТО</a>
                <a href="/reports.html" class="nav-link active">Отчеты</a>
                <div class="user-menu">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="stats-grid">
                <div class="stat-card"><div class="value" id="reportTotalCost">$6,200</div><div class="label">Всего потрачено</div></div>
                <div class="stat-card"><div class="value" id="reportAvgCost">$775</div><div class="label">В среднем в месяц</div></div>
                <div class="stat-card"><div class="value" id="reportMileage">15,247</div><div class="label">Текущий пробег</div></div>
                <div class="stat-card"><div class="value" id="reportNextService">2,500</div><div class="label">До следующего ТО</div></div>
            </div>
            <button id="exportBtn" class="export-btn">ЭКСПОРТ ОТЧЕТА</button>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Car Maintenance Visualizer. Все права защищены.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/common.js"></script>
</body>
</html>
