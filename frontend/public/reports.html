<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчеты - Car Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🚗</span>
                <span>Car Maintenance Visualizer</span>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Главная</a>
                <a href="/visualization.html" class="nav-link">3D Визуализация</a>
                <a href="/history.html" class="nav-link">История ТО</a>
                <a href="/reports.html" class="nav-link active">Отчеты</a>
                <div id="authButtons" style="display: flex; gap: 12px;">
                    <a href="/login.html" class="btn btn-outline">Вход</a>
                    <a href="/register.html" class="btn btn-primary">Регистрация</a>
                </div>
                <div id="userMenu" style="display: none; align-items: center; gap: 16px;">
                    <span class="user-name" id="userName"></span>
                    <a href="/dashboard.html" class="nav-link">Кабинет</a>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <h2>📊 Отчеты и аналитика</h2>
            <div id="reportsContainer">
                <div class="loading">Загрузка данных...</div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Car Maintenance Visualizer. Все права защищены.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function loadReports() {
            const token = window.auth.getToken();
            if (!token) {
                document.getElementById('reportsContainer').innerHTML = '<div class="placeholder">🔒 Войдите в аккаунт для просмотра отчетов</div>';
                return;
            }
            
            try {
                // Загружаем автомобили и историю
                const [carsRes, historyRes] = await Promise.all([
                    fetch(`${API_URL}/cars`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_URL}/history`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                
                const cars = await carsRes.json();
                const history = await historyRes.json();
                
                displayReports(cars, history);
            } catch (error) {
                console.error(error);
                document.getElementById('reportsContainer').innerHTML = '<div class="placeholder">❌ Ошибка загрузки данных</div>';
            }
        }
        
        function displayReports(cars, history) {
            const totalCost = history.reduce((sum, r) => sum + (r.cost || 0), 0);
            const totalMileage = cars.reduce((sum, c) => sum + (c.mileage || 0), 0);
            const avgCost = history.length > 0 ? totalCost / history.length : 0;
            
            const container = document.getElementById('reportsContainer');
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <div class="stat-value">${totalCost.toLocaleString()} ₽</div>
                            <div class="stat-label">Всего потрачено</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🚗</div>
                        <div class="stat-info">
                            <div class="stat-value">${cars.length}</div>
                            <div class="stat-label">Автомобилей</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-info">
                            <div class="stat-value">${totalMileage.toLocaleString()}</div>
                            <div class="stat-label">Общий пробег (км)</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🔧</div>
                        <div class="stat-info">
                            <div class="stat-value">${history.length}</div>
                            <div class="stat-label">Всего операций</div>
                        </div>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📈</div>
                        <div class="stat-info">
                            <div class="stat-value">${Math.round(avgCost).toLocaleString()} ₽</div>
                            <div class="stat-label">Средняя стоимость ТО</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⏰</div>
                        <div class="stat-info">
                            <div class="stat-value">${history.length > 0 ? history[history.length-1]?.date || '-' : '-'}</div>
                            <div class="stat-label">Последнее ТО</div>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 30px; display: flex; gap: 20px; justify-content: center;">
                    <button id="exportExcelBtn" class="btn btn-success" style="display: inline-flex; align-items: center; gap: 8px; width: auto;">📎 Экспорт в Excel</button>
                    <button id="printReportBtn" class="btn btn-outline" style="display: inline-flex; align-items: center; gap: 8px; width: auto;">🖨️ Печать отчета</button>
                </div>
            `;
            
            // Экспорт в Excel
            document.getElementById('exportExcelBtn')?.addEventListener('click', () => exportToExcel(cars, history));
            document.getElementById('printReportBtn')?.addEventListener('click', () => printReport(cars, history));
        }
        
        function exportToExcel(cars, history) {
            const data = [
                ['Отчет по техническому обслуживанию'],
                ['Дата:', new Date().toLocaleString()],
                [],
                ['Общая статистика'],
                ['Показатель', 'Значение'],
                ['Всего автомобилей', cars.length],
                ['Общий пробег', cars.reduce((s,c) => s + (c.mileage||0), 0).toLocaleString() + ' км'],
                ['Всего операций', history.length],
                ['Общие расходы', history.reduce((s,r) => s + (r.cost||0), 0).toLocaleString() + ' ₽'],
                [],
                ['Детализация операций'],
                ['Дата', 'Автомобиль', 'Услуга', 'Деталь', 'Пробег', 'Стоимость']
            ];
            
            history.forEach(op => {
                data.push([
                    op.date,
                    `${op.car_brand || ''} ${op.car_model || ''}`,
                    op.service_name || op.service_type,
                    op.part_key || '-',
                    op.mileage + ' км',
                    (op.cost || 0) + ' ₽'
                ]);
            });
            
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Отчет_ТО');
            XLSX.writeFile(wb, `отчет_ТО_${new Date().toISOString().split('T')[0]}.xlsx`);
            alert('✅ Отчет экспортирован в Excel!');
        }
        
        function printReport(cars, history) {
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head><title>Отчет по ТО</title>
                <style>
                    body { font-family: Arial, sans-serif; padding: 20px; }
                    h1 { color: #3b82f6; }
                    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                    th { background: #3b82f6; color: white; }
                    .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
                    .stat { background: #f0f0f0; padding: 10px; border-radius: 8px; }
                </style>
                </head>
                <body>
                <h1>Отчет по техническому обслуживанию</h1>
                <p>Дата: ${new Date().toLocaleString()}</p>
                <div class="stats">
                    <div class="stat"><strong>Автомобилей:</strong> ${cars.length}</div>
                    <div class="stat"><strong>Общий пробег:</strong> ${cars.reduce((s,c) => s + (c.mileage||0), 0).toLocaleString()} км</div>
                    <div class="stat"><strong>Всего операций:</strong> ${history.length}</div>
                    <div class="stat"><strong>Общие расходы:</strong> ${history.reduce((s,r) => s + (r.cost||0), 0).toLocaleString()} ₽</div>
                </div>
                <h2>История операций</h2>
                <table>
                    <tr><th>Дата</th><th>Автомобиль</th><th>Услуга</th><th>Деталь</th><th>Пробег</th><th>Стоимость</th></tr>
                    ${history.map(op => `
                        <tr>
                            <td>${op.date}</td>
                            <td>${op.car_brand || ''} ${op.car_model || ''}</td>
                            <td>${op.service_name || op.service_type}</td>
                            <td>${op.part_key || '-'}</td>
                            <td>${op.mileage} км</td>
                            <td>${(op.cost || 0).toLocaleString()} ₽</td>
                        </tr>
                    `).join('')}
                </table>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
        
        function updateUI() {
            const isAuth = window.auth && window.auth.isAuthenticated();
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            const userNameSpan = document.getElementById('userName');
            
            if (isAuth) {
                if (authButtons) authButtons.style.display = 'none';
                if (userMenu) userMenu.style.display = 'flex';
                const user = window.auth.getUser();
                if (userNameSpan) userNameSpan.textContent = user?.username || user?.full_name || '';
                loadReports();
            } else {
                if (authButtons) authButtons.style.display = 'flex';
                if (userMenu) userMenu.style.display = 'none';
                document.getElementById('reportsContainer').innerHTML = '<div class="placeholder">🔒 Войдите в аккаунт для просмотра отчетов</div>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', updateUI);
        window.addEventListener('storage', updateUI);
    </script>
</body>
</html>
