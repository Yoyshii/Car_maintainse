<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Car Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🚗</span>
                <span>Car Maintenance Visualizer</span>
            </div>
            <div class="nav-menu">
                <a href="/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/visualization.html" class="nav-link">3D Visualization</a>
                <a href="/history.html" class="nav-link">Service History</a>
                <a href="/reports.html" class="nav-link active">Reports</a>
                <div class="user-menu">
                    <span class="user-name" id="userName"></span>
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="stats-grid">
                <div class="stat-card"><div class="value" id="reportTotalCost">$6,200</div><div class="label">Total Spent</div></div>
                <div class="stat-card"><div class="value" id="reportAvgCost">$775</div><div class="label">Avg per Month</div></div>
                <div class="stat-card"><div class="value" id="reportMileage">15,247</div><div class="label">Current KM</div></div>
                <div class="stat-card"><div class="value" id="reportNextService">2,500</div><div class="label">Next Service KM</div></div>
            </div>
            <button id="exportBtn" class="export-btn">EXPORT FULL REPORT</button>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Car Maintenance Visualizer. All rights reserved.</p>
        </footer>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/common.js"></script>
</body>
</html>
